<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear QR Code</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js" integrity="sha512-r6rPgZ74poM5qp6WHL9HIwGtSUIkg9gS0w0c4767I9E1A3343tYnN0ZjuGvvd89A4w3D68eU2U7I88D169w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }

        #reader {
            width: 100%;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            font-weight: bold;
        }

        button:hover {
            background-color: #0056b3;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 20px;
            text-align: left;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #666;
        }

        #result-text {
            width: 100%;
            height: 60px;
            padding: 10px;
            border: 2px border #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            background-color: #fafafa;
            font-size: 14px;
            color: #333;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Leitor de QR Code</h1>
    
    <div id="reader"></div>
    
    <button id="btn-scan">Iniciar Câmera</button>

    <div class="result-box">
        <label for="result-text">Resultado do Scan:</label>
        <textarea id="result-text" readonly placeholder="O link aparecerá aqui..."></textarea>
    </div>
</div>

<script>
    const btnScan = document.getElementById('btn-scan');
    const resultText = document.getElementById('result-text');
    let html5QrCode;
    let isScanning = false;

    btnScan.addEventListener('click', () => {
        if (!isScanning) {
            // Se não estiver escaneando, inicia a câmera
            startScanner();
        } else {
            // Se já estiver escaneando, para a câmera
            stopScanner();
        }
    });

    function startScanner() {
        // Cria a instância do scanner apontando para a div '#reader'
        html5QrCode = new Html5Qrcode("reader");
        
        btnScan.innerText = "Carregando câmera...";
        btnScan.disabled = true;

        // Configurações do Scanner
        const config = { 
            fps: 10,             // Frames por segundo (10 é ideal para mobile)
            qrbox: { width: 250, height: 250 } // Tamanho da área de foco do QR Code
        };

        // Força o uso da câmera traseira ('environment')
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess,
            onScanFailure
        ).then(() => {
            isScanning = true;
            btnScan.innerText = "Parar Câmera";
            btnScan.disabled = false;
            resultText.value = ""; // Limpa o resultado anterior
        }).catch((err) => {
            console.error("Erro ao iniciar a câmera:", err);
            alert("Não foi possível acessar a câmera traseira. Verifique as permissões.");
            btnScan.innerText = "Iniciar Câmera";
            btnScan.disabled = false;
        });
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                btnScan.innerText = "Iniciar Câmera";
            }).catch((err) => {
                console.error("Erro ao parar a câmera:", err);
            });
        }
    }

    // Função executada quando o QR Code é lido com sucesso
    function onScanSuccess(decodedText, decodedResult) {
        // Mostra o resultado na caixa de texto
        resultText.value = decodedText;
        
        // Emite um feedback sonoro/vibratório discreto se o celular suportar
        if (navigator.vibrate) {
            navigator.vibrate(100);
        }

        // Para a câmera automaticamente após ler com sucesso
        stopScanner();
    }

    // Função executada a cada frame que NÃO encontra um QR code (opcional)
    function onScanFailure(error) {
        // Deixamos vazio para não poluir o console, já que ele roda várias vezes por segundo
    }
</script>

</body>
</html>
