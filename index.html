<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear QR Code</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 450px;
        }
        #reader {
            width: 100%;
            background-color: #111;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 15px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }
        button:disabled { background-color: #ccc; }
        .result-box { margin-top: 20px; text-align: left; }
        textarea {
            width: 100%; height: 60px; padding: 10px;
            border: 1px solid #ddd; border-radius: 6px;
            box-sizing: border-box; background-color: #fafafa;
        }
        /* Caixa de debug para ver o erro no celular */
        #debug-log {
            margin-top: 15px;
            padding: 10px;
            background-color: #fce8e6;
            color: #a51d24;
            border-radius: 6px;
            font-size: 12px;
            text-align: left;
            display: none;
            word-break: break-all;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Leitor de QR Code</h1>
    <div id="reader"></div>
    <button id="btn-scan">Iniciar Câmera</button>

    <div class="result-box">
        <label>Resultado:</label>
        <textarea id="result-text" readonly placeholder="O link aparecerá aqui..."></textarea>
    </div>

    <div id="debug-log"></div>
</div>

<script>
    const btnScan = document.getElementById('btn-scan');
    const resultText = document.getElementById('result-text');
    const debugLog = document.getElementById('debug-log');
    let html5QrCode;
    let isScanning = false;

    function showLog(msg) {
        debugLog.style.display = "block";
        debugLog.innerText = msg;
    }

    btnScan.addEventListener('click', () => {
        // Testar se a biblioteca realmente carregou
        if (typeof Html5Qrcode === 'undefined') {
            showLog("Erro: A biblioteca de QR Code não foi carregada pelo navegador. Verifique sua conexão ou adicione o script localmente.");
            return;
        }

        if (!isScanning) {
            startScanner();
        } else {
            stopScanner();
        }
    });

    function startScanner() {
        try {
            html5QrCode = new Html5Qrcode("reader");
            btnScan.innerText = "Carregando...";
            btnScan.disabled = true;

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                (text) => { // Sucesso
                    resultText.value = text;
                    stopScanner();
                },
                (err) => { /* falhas de frame ignoradas */ }
            ).then(() => {
                isScanning = true;
                btnScan.innerText = "Parar Câmera";
                btnScan.disabled = false;
                debugLog.style.display = "none";
            }).catch((err) => {
                btnScan.innerText = "Iniciar Câmera";
                btnScan.disabled = false;
                showLog("Erro ao iniciar câmera: " + err);
            });
        } catch (e) {
            showLog("Erro de execução: " + e.message);
            btnScan.innerText = "Iniciar Câmera";
            btnScan.disabled = false;
        }
    }

    function stopScanner() {
        if (html5QrCode) {
            html5QrCode.stop().then(() => {
                isScanning = false;
                btnScan.innerText = "Iniciar Câmera";
            });
        }
    }
</script>

</body>
</html>
