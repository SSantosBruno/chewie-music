<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Blind Spin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://open.spotify.com/embed/iframe-api/v1" async></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0a;
      --orange:   #FF5C1A;
      --orange2:  #FF8A50;
      --yellow:   #FFD200;
      --white:    #F5F5F5;
      --grey:     #555;
      --dark2:    #161616;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Poppins', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* Faint diagonal lines background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 28px,
        rgba(255,255,255,0.012) 28px,
        rgba(255,255,255,0.012) 29px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── App Layout ── */
    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 28px 24px;
      width: 100%;
    }

    /* ── Title ── */
    #header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0px;
    }

    #chewie-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      object-fit: cover;
      border: 2.5px solid var(--orange);
      margin-bottom: 6px;
      box-shadow: 0 0 16px rgba(255,92,26,0.5);
    }

    #title h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(38px, 11vw, 58px);
      letter-spacing: 8px;
      color: var(--white);
      line-height: 1;
      text-indent: 8px;
    }

    #title h1 span {
      color: var(--orange);
    }

    #title .sub {
      font-family: 'Poppins', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #444;
      text-align: center;
      margin-top: 2px;
    }

    /* ── Vinyl ── */
    #vinyl-wrap {
      width: min(268px, 72vw);
      height: min(268px, 72vw);
      position: relative;
    }

    #vinyl {
      width: 100%;
      height: 100%;
      animation: spin 2.1s linear infinite;
      animation-play-state: paused;
      will-change: transform;
      filter: drop-shadow(0 12px 36px rgba(0,0,0,0.9));
      transition: filter 0.5s ease;
    }

    #vinyl.spinning {
      animation-play-state: running;
      filter: drop-shadow(0 12px 36px rgba(0,0,0,0.9)) drop-shadow(0 0 22px rgba(255,92,26,0.22));
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Controls ── */
    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Play/Pause */
    #play-btn {
      position: relative;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: var(--orange);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.14s ease, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(255,92,26,0.5);
      flex-shrink: 0;
    }

    #play-btn:active { transform: scale(0.90); }
    #play-btn:hover  { box-shadow: 0 6px 30px rgba(255,92,26,0.7); }

    #play-btn svg {
      width: 30px;
      height: 30px;
      fill: #fff;
      flex-shrink: 0;
    }

    #icon-play  { margin-left: 4px; }
    #icon-pause { display: none; margin-left: 0; }

    /* Ready pulse */
    #play-btn.ready::after {
      content: '';
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid var(--orange);
      animation: pulse-ring 1.6s ease-out infinite;
      pointer-events: none;
    }

    @keyframes pulse-ring {
      0%   { opacity: 0.9; transform: scale(1); }
      100% { opacity: 0;   transform: scale(1.5); }
    }

    /* Next track button */
    #next-btn {
      background: var(--dark2);
      color: var(--white);
      border: 2px solid #2a2a2a;
      border-radius: 50px;
      padding: 14px 32px;
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #next-btn:hover  { border-color: var(--orange); color: var(--orange); }
    #next-btn:active { transform: scale(0.96); }

    #next-btn svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* ── Scanner ── */
    #scanner {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      background: #000;
    }

    #scanner.open { display: block; }

    #cam-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #scan-ui {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }

    #scan-ui::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center,
        transparent 26%,
        rgba(0,0,0,0.72) 62%,
        rgba(0,0,0,0.9) 100%
      );
      pointer-events: none;
    }

    #scan-frame {
      position: relative;
      width: min(230px, 62vw);
      height: min(230px, 62vw);
      z-index: 1;
    }

    #scan-frame::before,
    #scan-frame::after,
    #scan-frame .c-tr,
    #scan-frame .c-bl {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border-color: var(--orange);
      border-style: solid;
    }

    #scan-frame::before { top:0; left:0;   border-width:4px 0 0 4px; border-radius:4px 0 0 0; }
    #scan-frame::after  { bottom:0; right:0; border-width:0 4px 4px 0; border-radius:0 0 4px 0; }
    #scan-frame .c-tr   { top:0; right:0;  border-width:4px 4px 0 0; border-radius:0 4px 0 0; }
    #scan-frame .c-bl   { bottom:0; left:0; border-width:0 0 4px 4px; border-radius:0 0 0 4px; }

    #scan-line {
      position: absolute;
      left: 6px; right: 6px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--orange), var(--yellow), var(--orange), transparent);
      top: 0;
      animation: scan-move 1.8s ease-in-out infinite;
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(255,92,26,0.7);
    }

    @keyframes scan-move {
      0%  { top: 4px; opacity: 1; }
      88% { top: calc(100% - 7px); opacity: 1; }
      100%{ top: calc(100% - 7px); opacity: 0; }
    }

    #scan-hint {
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.7);
      text-align: center;
      z-index: 1;
    }

    #cancel-scan {
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(255,255,255,0.08);
      border: 1.5px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.85);
      padding: 13px 36px;
      border-radius: 50px;
      cursor: pointer;
      z-index: 1;
      transition: background 0.2s;
    }

    #cancel-scan:active { background: rgba(255,255,255,0.14); }
    #cam-canvas { display: none; }

    /* ── Hidden Spotify ── */
    #sp-wrap {
      position: fixed;
      right: 0; bottom: 0;
      width: 300px;
      height: 80px;
      visibility: hidden;
      pointer-events: none;
      overflow: hidden;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1e1e1e;
      border: 1.5px solid var(--orange);
      color: var(--white);
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

  <!-- Controls -->
  <div id="controls">
    <button id="play-btn" onclick="togglePlay()">
      <svg id="icon-play"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
    </button>
    <button id="next-btn" onclick="openScanner()">
      <svg viewBox="0 0 24 24"><path d="M9.5 6.5v3h-3v-3h3M11 5H5v6h6V5zm-1.5 9.5v3h-3v-3h3M11 13H5v6h6v-6zm6.5-6.5v3h-3v-3h3M19 5h-6v6h6V5zm-6 8h1.5v1.5H13V13zm1.5 1.5H16V16h-1.5v-1.5zM16 13h1.5v1.5H16V13zm-3 3h1.5v1.5H13V16zm1.5 1.5H16V19h-1.5v-1.5zM16 16h1.5v1.5H16V16zm1.5-1.5H19V16h-1.5v-1.5zm0 3H19V19h-1.5v-1.5z"/></svg>

    </button>

<!-- Scanner -->
<div id="scanner">
  <video id="cam-video" autoplay playsinline muted></video>
  <canvas id="cam-canvas"></canvas>
  <div id="scan-ui">
    <div id="scan-frame">
      <div class="c-tr"></div>
      <div class="c-bl"></div>
      <div id="scan-line"></div>
    </div>
    <div id="scan-hint">Aponte para o QR code da música</div>
    <button id="cancel-scan" onclick="closeScanner()">Cancelar</button>
  </div>
</div>

<!-- Hidden Spotify -->
<div id="sp-wrap"></div>

<!-- Toast -->
<div id="toast"></div>

<script>
'use strict';

const vinyl      = document.getElementById('vinyl');
const playBtn    = document.getElementById('play-btn');
const iconPlay   = document.getElementById('icon-play');
const iconPause  = document.getElementById('icon-pause');
const scanner    = document.getElementById('scanner');
const camVideo   = document.getElementById('cam-video');
const camCanvas  = document.getElementById('cam-canvas');
const spWrap     = document.getElementById('sp-wrap');
const toastEl    = document.getElementById('toast');

let isPlaying    = false;
let spotifyCtrl  = null;
let spotifyAPI   = null;
let cameraStream = null;
let rafId        = null;
let pendingTrack = null;
let toastTimer   = null;

window.onSpotifyIframeApiReady = (IFrameAPI) => {
  spotifyAPI = IFrameAPI;
};

function createController(trackId, autoplay) {
  spWrap.innerHTML = '';
  spotifyCtrl = null;
  const el = document.createElement('div');
  spWrap.appendChild(el);
  spotifyAPI.createController(el, {
    uri: `spotify:track:${trackId}`,
    width: '300',
    height: '80',
  }, (ctrl) => {
    spotifyCtrl = ctrl;
    ctrl.addListener('playback_update', (e) => {
      const playing = !e.data.isPaused;
      if (playing !== isPlaying) setPlayState(playing);
    });
    if (autoplay) ctrl.play();
  });
}

function setPlayState(playing) {
  isPlaying = playing;
  vinyl.classList.toggle('spinning', playing);
  iconPlay.style.display  = playing ? 'none' : '';
  iconPause.style.display = playing ? ''     : 'none';
  if (playing) playBtn.classList.remove('ready');
}

function togglePlay() {
  if (!spotifyCtrl && !pendingTrack) {
    showToast('Escaneie um QR code primeiro ↑');
    return;
  }
  if (!spotifyCtrl && pendingTrack) {
    if (!spotifyAPI) { showToast('Aguarde o Spotify carregar…'); return; }
    const id = pendingTrack; pendingTrack = null;
    playBtn.classList.remove('ready');
    createController(id, true);
    return;
  }
  if (isPlaying) { spotifyCtrl.pause(); } else { spotifyCtrl.play(); }
}

async function openScanner() {
  try {
    cameraStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    camVideo.srcObject = cameraStream;
    scanner.classList.add('open');
    await camVideo.play();
    startScanLoop();
  } catch (err) {
    showToast('Não foi possível acessar a câmera');
  }
}

function closeScanner() {
  if (rafId) { clearTimeout(rafId); cancelAnimationFrame(rafId); rafId = null; }
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  camVideo.srcObject = null;
  scanner.classList.remove('open');
}

function startScanLoop() {
  const ctx = camCanvas.getContext('2d', { willReadFrequently: true });

  function tick() {
    if (camVideo.readyState >= camVideo.HAVE_ENOUGH_DATA) {
      const vw = camVideo.videoWidth;
      const vh = camVideo.videoHeight;

      // Crop to the central square of the camera frame (where the scan box is).
      // This drastically reduces pixels sent to jsQR → much faster on mobile.
      const cropSize = Math.round(Math.min(vw, vh) * 0.72);
      const sx = Math.round((vw - cropSize) / 2);
      const sy = Math.round((vh - cropSize) / 2);

      // Downscale to 400×400 max for jsQR performance
      const outSize = Math.min(cropSize, 400);
      camCanvas.width  = outSize;
      camCanvas.height = outSize;
      ctx.drawImage(camVideo, sx, sy, cropSize, cropSize, 0, 0, outSize, outSize);

      const img  = ctx.getImageData(0, 0, outSize, outSize);
      const code = jsQR(img.data, img.width, img.height, { inversionAttempts: 'attemptBoth' });

      if (code?.data) {
        const trackId = extractSpotifyTrackId(code.data);
        if (trackId) { closeScanner(); onTrackScanned(trackId); return; }
      }
    }
    // ~8 fps is plenty for QR scanning and saves mobile CPU
    rafId = setTimeout(() => requestAnimationFrame(tick), 120);
  }

  rafId = requestAnimationFrame(tick);
}

function extractSpotifyTrackId(raw) {
  const http = raw.match(/open\.spotify\.com\/(?:[a-z]{2}(?:-[a-z]+)?\/)?track\/([A-Za-z0-9]+)/);
  if (http) return http[1];
  const uri = raw.match(/^spotify:track:([A-Za-z0-9]+)/);
  if (uri) return uri[1];
  return null;
}

function onTrackScanned(trackId) {
  if (spotifyCtrl) { spotifyCtrl.pause(); spotifyCtrl = null; spWrap.innerHTML = ''; }
  setPlayState(false);
  pendingTrack = trackId;
  playBtn.classList.add('ready');
  if (spotifyAPI) {
    createController(trackId, false);
    pendingTrack = null;
  }
}

function showToast(msg, ms = 2800) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), ms);
}
</script>
